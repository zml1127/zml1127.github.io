<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>物品管理平台</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- 登录页面 -->
    <div id="loginPage" class="login-page">
        <div class="login-card">
            <h2>🗄️ 物品管理平台</h2>
            <p class="subtitle">请登录以继续</p>
            <div id="errorMsg" class="error-msg">用户名或密码错误</div>
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <input type="text" id="username" placeholder="请输入用户名" required>
                </div>
                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" placeholder="请输入密码" required>
                </div>
                <button type="submit" class="btn">登 录</button>
            </form>
            <p style="text-align: center; margin-top: 20px; color: #999; font-size: 0.9rem;">
                默认账号：admin / admin123
            </p>
        </div>
    </div>

    <!-- 主页面 -->
    <div id="mainPage" class="main-page">
        <!-- 导航栏 -->
        <nav class="navbar">
            <div class="nav-content">
                <button class="menu-toggle" onclick="toggleMenu()">☰</button>
                <div class="nav-brand">🗄️ 物品管理平台</div>
                <div class="nav-links" id="navLinks">
                    <a href="#" class="active" data-tab="dashboard" onclick="switchTab('dashboard')">📊 仪表盘</a>
                    <a href="#" data-tab="cabinet" onclick="switchTab('cabinet')">📦 柜子管理</a>
                    <a href="#" data-tab="item" onclick="switchTab('item')">📦 物品管理</a>
                </div>
                <div class="nav-user">
                    <span>👤 管理员</span>
                    <button class="btn logout-btn" onclick="logout()">登出</button>
                </div>
            </div>
        </nav>

        <div class="container">
            <!-- 仪表盘 Tab -->
            <div id="dashboardTab" class="tab-content active">
                <div class="dashboard">
                    <h2>📊 数据概览</h2>
                    
                    <!-- 全局搜索框 -->
                    <div class="global-search">
                        <input type="text" id="globalSearch" placeholder="🔍 全局搜索：输入物品名称或柜子名称..." oninput="globalSearch()">
                        <div id="globalSearchResults" class="global-search-results"></div>
                    </div>
                    
                    <div class="stats-grid">
                        <div class="stat-card clickable" onclick="switchTab('cabinet')">
                            <div class="icon">📦</div>
                            <div class="number" id="totalCabinets">0</div>
                            <div class="label">柜子总数</div>
                        </div>
                        <div class="stat-card clickable" onclick="switchTab('item')">
                            <div class="icon">📦</div>
                            <div class="number" id="totalItems">0</div>
                            <div class="label">物品总数</div>
                        </div>
                        <div class="stat-card">
                            <div class="icon">📈</div>
                            <div class="number" id="avgItems">0</div>
                            <div class="label">平均每柜物品</div>
                        </div>
                    </div>
                    
                    <div class="dashboard-details">
                        <div class="detail-panel">
                            <h3>📊 柜子物品分布</h3>
                            <div id="cabinetDistribution"></div>
                        </div>
                        
                        <div class="detail-panel">
                            <h3>🕒 最近添加的物品（历史轨迹）</h3>
                            <div id="recentItems"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 柜子管理 Tab -->
            <div id="cabinetTab" class="tab-content">
                <!-- 上方：创建按钮和表单 -->
                <div class="panel" style="margin-bottom: 20px;">
                    <div class="panel-header">
                        <span>📦 柜子管理</span>
                        <span class="badge" id="cabinetCount">0</span>
                    </div>
                    <div class="panel-content">
                        <!-- 创建按钮 -->
                        <button type="button" id="showCabinetFormBtn" class="btn" onclick="toggleCabinetForm()">
                            ➕ 创建新柜子
                        </button>
                        
                        <!-- 创建表单（默认隐藏） -->
                        <div id="cabinetFormContainer" style="display: none; margin-top: 20px;">
                            <form id="cabinetForm">
                                <div class="form-group">
                                    <label for="cabinetName">柜子名称</label>
                                    <input type="text" id="cabinetName" placeholder="请输入柜子名称" required>
                                </div>
                                <div class="form-group">
                                    <label for="cabinetLocation">柜子位置（类别）</label>
                                    <select id="cabinetLocation" required>
                                        <option value="">请选择位置</option>
                                        <option value="客厅">客厅</option>
                                        <option value="卧室">卧室</option>
                                        <option value="厨房">厨房</option>
                                        <option value="书房">书房</option>
                                        <option value="阳台">阳台</option>
                                        <option value="卫生间">卫生间</option>
                                        <option value="储物间">储物间</option>
                                        <option value="其他">其他</option>
                                    </select>
                                </div>
                                <!-- 柜子照片功能已移除 -->
                                <div style="display: flex; gap: 10px;">
                                    <button type="submit" class="btn">确认创建</button>
                                    <button type="button" class="btn" style="background: #666;" onclick="toggleCabinetForm()">取消</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>

                <!-- 下方：搜索和列表 -->
                <div class="panel">
                    <div class="panel-content">
                        <!-- 搜索栏 -->
                        <div class="search-bar" style="margin-bottom: 15px; padding: 15px;">
                            <input type="text" id="cabinetSearch" placeholder="🔍 搜索柜子名称..." oninput="filterCabinets()">
                            <select id="locationFilter" style="margin-top: 10px; width: 100%; padding: 10px; border: 2px solid #e0e0e0; border-radius: 8px;" onchange="filterCabinets()">
                                <option value="">全部位置</option>
                                <option value="客厅">客厅</option>
                                <option value="卧室">卧室</option>
                                <option value="厨房">厨房</option>
                                <option value="书房">书房</option>
                                <option value="阳台">阳台</option>
                                <option value="卫生间">卫生间</option>
                                <option value="储物间">储物间</option>
                                <option value="其他">其他</option>
                            </select>
                        </div>

                        <div class="list-section">
                            <table class="data-table">
                                <thead>
                                    <tr>
                                        <th>序号</th>
                                        <th>柜子名称</th>
                                        <th>位置（类别）</th>
                                        <th>物品数量</th>
                                        <th>创建时间</th>
                                        <th>操作</th>
                                    </tr>
                                </thead>
                                <tbody id="cabinetList"></tbody>
                            </table>
                        </div>

                        <!-- 编辑柜子模态框 -->
                        <div id="editCabinetModal" class="modal">
                            <div class="modal-content" style="background: white; padding: 30px; border-radius: 15px; max-width: 500px; width: 90%;">
                                <span class="modal-close" onclick="closeEditCabinetModal()">&times;</span>
                                <h3 style="margin-bottom: 20px;">编辑柜子</h3>
                                <form id="editCabinetForm">
                                    <input type="hidden" id="editCabinetId">
                                    <div class="form-group">
                                        <label for="editCabinetName">柜子名称</label>
                                        <input type="text" id="editCabinetName" placeholder="请输入柜子名称" required>
                                    </div>
                                    <div class="form-group">
                                        <label for="editCabinetLocation">柜子位置（类别）</label>
                                        <select id="editCabinetLocation" required>
                                            <option value="">请选择位置</option>
                                            <option value="客厅">客厅</option>
                                            <option value="卧室">卧室</option>
                                            <option value="厨房">厨房</option>
                                            <option value="书房">书房</option>
                                            <option value="阳台">阳台</option>
                                            <option value="卫生间">卫生间</option>
                                            <option value="储物间">储物间</option>
                                            <option value="其他">其他</option>
                                        </select>
                                    </div>
                                    <div style="display: flex; gap: 10px; margin-top: 20px;">
                                        <button type="submit" class="btn">保存修改</button>
                                        <button type="button" class="btn" style="background: #666;" onclick="closeEditCabinetModal()">取消</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 物品管理 Tab -->
            <div id="itemTab" class="tab-content">
                <!-- 上方：创建按钮和表单 -->
                <div class="panel" style="margin-bottom: 20px;">
                    <div class="panel-header">
                        <span>📦 物品管理</span>
                        <span class="badge badge-cabinet" id="itemCount">0</span>
                    </div>
                    <div class="panel-content">
                        <!-- 创建按钮 -->
                        <button type="button" id="showItemFormBtn" class="btn" onclick="toggleItemForm()">
                            ➕ 添加新物品
                        </button>
                        
                        <!-- 创建表单（默认隐藏） -->
                        <div id="itemFormContainer" style="display: none; margin-top: 20px;">
                            <form id="itemForm">
                                <div class="form-group">
                                    <label for="itemName">物品名称</label>
                                    <input type="text" id="itemName" placeholder="请输入物品名称" required>
                                </div>
                                <div class="form-group">
                                    <label for="itemCabinet">放置柜子（归属关联）</label>
                                    <select id="itemCabinet" required>
                                        <option value="">请选择柜子</option>
                                    </select>
                                </div>
                                <!-- 物品照片功能已移除 -->
                                <div style="display: flex; gap: 10px;">
                                    <button type="submit" class="btn">确认添加</button>
                                    <button type="button" class="btn" style="background: #666;" onclick="toggleItemForm()">取消</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>

                <!-- 下方：搜索和列表 -->
                <div class="panel">
                    <div class="panel-content">
                        <!-- 搜索栏 -->
                        <div class="search-bar" style="margin-bottom: 15px; padding: 15px;">
                            <input type="text" id="itemSearch" placeholder="🔍 搜索物品名称..." oninput="filterItems()">
                        </div>

                        <div class="list-section">
                            <table class="data-table">
                                <thead>
                                    <tr>
                                        <th>序号</th>
                                        <th>物品名称</th>
                                        <th>所属柜子</th>
                                        <th>柜子位置</th>
                                        <th>创建时间</th>
                                        <th>操作</th>
                                    </tr>
                                </thead>
                                <tbody id="itemList"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
