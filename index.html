<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>卫生专业技术资格考试 - 真题模拟</title>
    <style>
      :root {
        --primary-dark: #004a7c;
        --primary-light: #8fb3d3;
        --secondary: #e67e22;
        --bg-light: #f4f7f9;
        --sidebar-bg: #d9e8f5;
        --border-color: #b5c9d9;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Microsoft YaHei", sans-serif;
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        background-color: var(--bg-light);
      }

      /* Header Styles */
      header {
        background-color: var(--primary-dark);
        color: white;
        padding: 10px 20px;
        font-size: 14px;
      }

      .header-top {
        display: flex;
        justify-content: space-between;
        margin-bottom: 5px;
      }

      .header-info {
        display: flex;
        gap: 20px;
      }

      .seat-box {
        background-color: #94b70b;
        padding: 2px 15px;
        font-weight: bold;
        color: #000;
      }

      /* Main Content Layout */
      main {
        flex: 1;
        display: flex;
        overflow: hidden;
      }

      .question-area {
        flex: 1;
        padding: 30px;
        background-color: white;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
      }

      .sidebar {
        width: 300px;
        background-color: var(--sidebar-bg);
        border-left: 1px solid var(--border-color);
        display: flex;
        flex-direction: column;
        overflow-y: auto;
      }

      /* Sidebar Navigation Grid */
      .sidebar-legend {
        padding: 10px;
        display: flex;
        gap: 15px;
        font-size: 12px;
        border-bottom: 1px solid var(--border-color);
      }

      .legend-item {
        display: flex;
        align-items: center;
        gap: 5px;
      }

      .legend-box {
        width: 15px;
        height: 15px;
        border: 1px solid #999;
      }

      .legend-box.answered {
        background-color: #7a9cb5;
      }
      .legend-box.current {
        background-color: var(--secondary);
      }
      .legend-box.unanswered {
        background-color: #fff;
      }

      .nav-section {
        padding: 10px;
      }

      .section-title {
        background-color: #5c93c4;
        color: white;
        padding: 5px 10px;
        font-size: 13px;
        margin-bottom: 10px;
        cursor: pointer;
        display: flex;
        justify-content: space-between;
      }

      .nav-grid {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 5px;
        margin-bottom: 15px;
      }

      .nav-item {
        aspect-ratio: 1;
        background-color: white;
        border: 1px solid #b5c9d9;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        cursor: pointer;
      }

      .nav-item.current {
        background-color: var(--secondary);
        color: white;
        border-color: var(--secondary);
      }
      .nav-item.answered {
        background-color: #7a9cb5;
        color: white;
      }
      .nav-item.wrong {
        background-color: #ff4d4f;
        color: white;
      }

      /* Question Display */
      .q-header {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
        font-size: 18px;
      }

      .q-num {
        color: var(--primary-dark);
        font-weight: bold;
        white-space: nowrap;
      }

      .q-text {
        line-height: 1.6;
        background-color: #e6f3ff;
        padding: 15px;
        border-radius: 4px;
        width: 100%;
      }

      .options-list {
        list-style: none;
        margin-top: 20px;
      }

      .option-item {
        margin-bottom: 15px;
        display: flex;
        align-items: flex-start;
        gap: 10px;
        cursor: pointer;
        padding: 8px;
        transition: background 0.2s;
      }

      .option-item:hover {
        background-color: #f0f7ff;
      }

      .option-item.selected {
        background-color: #e1f0ff;
      }

      .option-input {
        margin-top: 4px;
      }

      .option-label {
        font-size: 16px;
        line-height: 1.4;
      }

      /* Result Info */
      .result-box {
        margin-top: 20px;
        padding: 15px;
        border-radius: 4px;
        display: none;
      }

      .result-box.show {
        display: block;
      }
      .result-box.wrong {
        background-color: #fff1f0;
        border: 1px solid #ffa39e;
      }
      .result-box.correct {
        background-color: #f6ffed;
        border: 1px solid #b7eb8f;
      }

      .reason-text {
        margin-top: 10px;
        font-size: 14px;
        color: #666;
      }

      /* Footer Styles */
      footer {
        background-color: var(--primary-light);
        border-top: 1px solid var(--border-color);
      }

      .footer-nav {
        display: flex;
        padding: 10px 20px;
        gap: 10px;
      }

      .btn {
        padding: 8px 20px;
        border: 1px solid var(--primary-dark);
        background-color: #fefefe;
        color: var(--primary-dark);
        cursor: pointer;
        font-size: 14px;
        display: flex;
        align-items: center;
        gap: 5px;
        border-radius: 4px;
      }

      .btn:hover {
        background-color: #f0f0f0;
      }
      .btn.primary {
        background-color: #94b70b;
        border-color: #94b70b;
        color: #000;
        font-weight: bold;
      }

      .footer-status {
        background-color: var(--primary-dark);
        color: white;
        padding: 5px 20px;
        font-size: 12px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .status-left {
        display: flex;
        gap: 20px;
      }
      .status-right {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .progress-container {
        width: 200px;
        height: 10px;
        background-color: #fff;
        border-radius: 5px;
        overflow: hidden;
      }

      .progress-bar {
        height: 100%;
        background-color: #94b70b;
        width: 0%;
        transition: width 0.3s;
      }

      /* Modal for Results */
      #scoreModal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        justify-content: center;
        align-items: center;
        z-index: 1000;
      }

      .modal-content {
        background: white;
        padding: 30px;
        border-radius: 8px;
        text-align: center;
        min-width: 300px;
      }

      .modal-score {
        font-size: 48px;
        color: var(--secondary);
        margin: 20px 0;
      }

      /* Calculator Styles */
      #calcModal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.3);
        justify-content: center;
        align-items: center;
        z-index: 1001;
      }
      .calc-container {
        background: #f0f0f0;
        padding: 15px;
        border-radius: 10px;
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
        width: 260px;
        border: 1px solid #ccc;
      }
      .calc-header {
        display: flex;
        justify-content: space-between;
        margin-bottom: 10px;
        font-size: 14px;
        font-weight: bold;
        color: #333;
      }
      .calc-close {
        cursor: pointer;
        color: #666;
      }
      .calc-display {
        background: #fff;
        border: 1px solid #bbb;
        padding: 10px;
        text-align: right;
        font-size: 20px;
        margin-bottom: 10px;
        height: 45px;
        overflow: hidden;
        border-radius: 4px;
      }
      .calc-buttons {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 8px;
      }
      .calc-btn {
        padding: 12px;
        border: 1px solid #ccc;
        background: #fff;
        cursor: pointer;
        text-align: center;
        border-radius: 4px;
        font-weight: bold;
      }
      .calc-btn:hover {
        background: #e0e0e0;
      }
      .calc-btn.op {
        background: #f9f9f9;
        color: var(--primary-dark);
      }
      .calc-btn.eq {
        background: var(--secondary);
        color: white;
        grid-column: span 2;
      }
      .calc-btn.clear {
        color: #ff4d4f;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="header-top">
        <div class="header-info">
          <span>当前试室：第一试室</span>
          <span>当前场次：第01场</span>
        </div>
        <div class="seat-box">座位号：1</div>
      </div>
      <div class="header-info">
        <span>姓名：智爹的好大儿--赵鑫</span>
        <span>性别：男</span>
        <span>准考证号：1001</span>
        <span>报考专业：普通外科学中级</span>
      </div>
    </header>

    <main>
      <div class="question-area" id="questionArea">
        <div class="q-header">
          <div class="q-num" id="questionNum">第1题</div>
          <div class="q-text" id="questionText">正在加载题目...</div>
        </div>
        <ul class="options-list" id="optionsList">
          <!-- Options will be loaded here -->
        </ul>
        <div class="result-box" id="resultBox">
          <div id="correctAnswer"></div>
          <div class="reason-text" id="reasonText"></div>
        </div>
      </div>

      <aside class="sidebar">
        <div class="sidebar-legend">
          <div class="legend-item">
            <div class="legend-box answered"></div>
            已答
          </div>
          <div class="legend-item">
            <div class="legend-box current"></div>
            在答
          </div>
          <div class="legend-item">
            <div class="legend-box unanswered"></div>
            未答
          </div>
        </div>

        <div class="nav-section" id="navSections">
          <!-- Sections like 单选题, 多选题 will be loaded here -->
        </div>
      </aside>
    </main>

    <footer>
      <div class="footer-nav">
        <button class="btn" id="prevBtn">上一题 (←)</button>
        <button class="btn" id="nextBtn">下一题 (→)</button>
        <button class="btn" onclick="toggleCalc()">计算器 (2)</button>
        <button class="btn">帮助 (3)</button>
        <button class="btn primary" id="submitBtn">交卷 (4)</button>
      </div>
      <div class="footer-status">
        <div class="status-left">
          <span id="totalTime">考试总时间：90 分钟</span>
          <span id="timeLeft">剩余时间：90 分钟</span>
        </div>
        <div class="status-right">
          <span id="totalCount">总题数 0</span>
          <span id="answeredCount">已答 0 题</span>
          <span>答题进度</span>
          <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
          </div>
          <span id="progressText">0%</span>
        </div>
      </div>
    </footer>

    <div id="scoreModal">
      <div class="modal-content">
        <h2>考试结束</h2>
        <p>您的最终得分是：</p>
        <div class="modal-score" id="finalScore">0</div>
        <button class="btn primary" onclick="closeModal()">查看错题解析</button>
      </div>
    </div>

    <!-- Calculator Modal -->
    <div id="calcModal">
      <div class="calc-container">
        <div class="calc-header">
          <span>计算器</span>
          <span class="calc-close" onclick="toggleCalc()">✖</span>
        </div>
        <div class="calc-display" id="calcDisplay">0</div>
        <div class="calc-buttons">
          <div class="calc-btn clear" onclick="calcClear()">C</div>
          <div class="calc-btn op" onclick="calcInput('/')">/</div>
          <div class="calc-btn op" onclick="calcInput('*')">*</div>
          <div class="calc-btn op" onclick="calcInput('-')">-</div>
          <div class="calc-btn" onclick="calcInput('7')">7</div>
          <div class="calc-btn" onclick="calcInput('8')">8</div>
          <div class="calc-btn" onclick="calcInput('9')">9</div>
          <div class="calc-btn op" onclick="calcInput('+')">+</div>
          <div class="calc-btn" onclick="calcInput('4')">4</div>
          <div class="calc-btn" onclick="calcInput('5')">5</div>
          <div class="calc-btn" onclick="calcInput('6')">6</div>
          <div class="calc-btn" onclick="calcInput('.')">.</div>
          <div class="calc-btn" onclick="calcInput('1')">1</div>
          <div class="calc-btn" onclick="calcInput('2')">2</div>
          <div class="calc-btn" onclick="calcInput('3')">3</div>
          <div class="calc-btn" onclick="calcInput('0')">0</div>
          <div class="calc-btn eq" onclick="calcEqual()">=</div>
        </div>
      </div>
    </div>

    <script>
      const questions = [
        {
          id: 1,
          title: "基础知识",
          text: "收缩压 90mmHg，神志尚清，此时失血量最可能为",
          options: [
            "A. 400～800",
            "B. 800～1600",
            "C. >1600",
            "D. 400～200",
            "E. 200～100",
          ],
          answer: "B",
          type: "single",
          reason:
            "解析：一般来说，成人失血量达800～1600mL时，会出现收缩压90mmHg左右等表现，同时神志可尚清。失血量400～800mL时症状相对较轻，收缩压多正常。失血量>1600mL症状会更严重。而D、E选项范围不符合临床实际失血表现与血压对应情况，所以选B。",
        },
        {
          id: 2,
          text: "男，60岁。因骨折致损伤性休克，血压 90/70mmHg，中心静脉压 10cmH₂O，在10分钟内经静脉输入等渗盐水 250mL 后，测中心静脉压为 10cmH₂O，血压 100/80mmHg，此时，最佳治疗方案是",
          options: [
            "A. 应用血管收缩剂",
            "B. 应用血管扩张剂",
            "C. 应用皮质类固醇",
            "D. 补充血容量",
            "E. 应用强心剂",
          ],
          answer: "D",
          type: "single",
          reason:
            "解析：患者血压低，中心静脉压正常，补液后血压上升，中心静脉压不变，提示血容量不足，应继续补充血容量，而非用血管收缩剂、扩张剂、强心剂或皮质类固醇，所以选D。",
        },
        {
          id: 3,
          text: "关于感染性休克，下列不正确的是",
          options: [
            "A. 通常由金黄色葡萄球菌感染引起",
            "B. 治疗较低血容量休克困难",
            "C. 常伴 SIRS",
            "D. 皮肤可以潮红",
            "E. 脉压可以>30mmHg",
          ],
          answer: "A",
          type: "single",
          reason:
            "解析：感染性休克常由革兰阴性杆菌等引起，而非通常由金黄色葡萄球菌感染引起，其治疗较困难，常伴SIRS，皮肤可潮红，脉压可>30mmHg，故A不正确。",
        },
        {
          id: 4,
          text: "急性肾衰的突出临床表现",
          options: [
            "A. 尿急，尿痛",
            "B. 血中尿素氮进行性升高",
            "C. 排尿困难或突然无尿",
            "D. 尿量明显减少",
            "E. 尿量明显增多",
          ],
          answer: "D",
          type: "single",
          reason:
            "解析：尿量明显减少为急性肾衰竭的突出表现。尿量明显增多不一定与肾脏有关，如输液过多，利尿剂的应用等均可使尿量增加。另外，急性肾衰的多尿期一般发生在少尿期后，不能作为突出临床表现。排尿困难或突然无尿可能与尿路梗阻有关，不说明肾衰。尿急尿痛是尿路感染的表现。急性肾衰时不但血中尿素氮升高，肌酐也进行性增高。单纯尿素氮增加不能说明存在肾衰。",
        },
        {
          id: 5,
          text: "下列哪一项不是导致多器官功能障碍综合征（MODS）的常见原因",
          options: [
            "A. 出血坏死性胰腺炎",
            "B. 休克",
            "C. 大面积烧伤",
            "D. 慢性胆囊炎",
            "E. 绞窄性肠梗阻",
          ],
          answer: "D",
          type: "single",
          reason:
            "解析：MODS常见于急性重症疾病或情况，例如创伤、烧伤、大手术、严重的脓毒血症、休克或心搏与呼吸骤停复苏后以及急性出血坏死型胰腺炎、绞窄性肠梗阻等。值得注意的是，慢性胆囊炎并非急性重症疾病，因此不会导致MODS的发生。",
        },
        {
          id: 6,
          text: "ARDS患者诊断标准中，氧合指数（PaO₂/FiO₂）应为",
          options: [
            "A. ≤150mmHg",
            "B. ≥200mmHg",
            "C. ≤200mmHg",
            "D. ≤300mmHg",
            "E. ≥300mmHg",
          ],
          answer: "C",
          type: "single",
          reason:
            "解析：急性肺损伤（ALI）时氧合指数（PaO₂/FiO₂）≤300mmHg；急性呼吸窘迫综合征（ARDS）时氧合指数（PaO₂/FiO₂）≤200mmHg。",
        },
        {
          id: 7,
          text: "为减少局麻药的吸收，常添加肾上腺素，浓度为",
          options: [
            "A. 1:2000000",
            "B. 1:200000",
            "C. 1:20000",
            "D. 1:2000",
            "E. 1:500000",
          ],
          answer: "B",
          type: "single",
          reason:
            "解析：局麻药中加入小剂量肾上腺素可减少局麻药吸收，降低血中局麻药浓度，降低局麻药中毒概率，肾上腺素浓度不宜过高，一般在1:20万～40万。必须注意身体末端部位需要局麻时（手指、脚趾和阴茎部等处），禁用肾上腺素，以防组织坏死。合并冠心病、高血压、甲亢和糖尿病等患者应慎用或不用。",
        },
        {
          id: 8,
          text: "下列部位中，局麻药中可以加入肾上腺素的是",
          options: [
            "A. 手指",
            "B. 脚趾",
            "C. 头皮",
            "D. 阴茎",
            "E. 以上都不是",
          ],
          answer: "C",
          type: "single",
          reason:
            "解析：在末梢动脉部位，如手指、脚趾、阴茎等处、不能加肾上腺素，以防引起组织坏死。",
        },
        {
          id: 9,
          text: "局麻药的麻醉效能主要决定于",
          options: [
            "A. pKa（离解常数）",
            "B. 相对分子质量",
            "C. 浓度",
            "D. 脂溶性（分配系数）",
            "E. 蛋白结合",
          ],
          answer: "D",
          type: "single",
          reason:
            "解析：局麻药的麻醉效能主要决定于麻醉药的脂溶性（分配系数），脂溶性高的麻醉药，弥散性能好，麻醉效能强。",
        },
        {
          id: 10,
          text: "以下影响硬膜外麻醉平面的因素中最不重要的为",
          options: [
            "A. 药物容积",
            "B. 注药方式",
            "C. 病人体位",
            "D. 穿刺间隙",
            "E. 导管方向",
          ],
          answer: "C",
          type: "single",
          reason:
            "解析：影响麻醉平面的主要因素是：局麻药的容积，穿刺间隙，导管方向和注药方式，病人情况（如老年，妊娠等）等。其他如药液浓度，注药速度和病人体位等也有一定的影响，但不是重要因素。",
        },
        {
          id: 11,
          text: "(11~12 题共用备选答案) 病人男性，50岁，因胰十二指肠切除而并发肠瘘，每日消化液丢失约10000mL。近日病人出现腹胀、恶心和呕吐，四肢无力。腱反射消失，肠鸣音减弱",
          options: [
            "A. 低钾血症",
            "B. 高钾血症",
            "C. 低渗性缺水",
            "D. 等渗性缺水",
            "E. 水中毒",
          ],
          answer: "A",
          type: "single",

      let currentIdx = 0;
      let userAnswers = {}; // { questionId: value }
      let isSubmitted = false;

      const questionArea = document.getElementById("questionArea");
      const questionNum = document.getElementById("questionNum");
      const questionText = document.getElementById("questionText");
      const optionsList = document.getElementById("optionsList");
      const navSections = document.getElementById("navSections");
      const answeredCountSpan = document.getElementById("answeredCount");
      const totalCountSpan = document.getElementById("totalCount");
      const progressBar = document.getElementById("progressBar");
      const progressText = document.getElementById("progressText");
      const resultBox = document.getElementById("resultBox");
      const correctAnswerDiv = document.getElementById("correctAnswer");
      const reasonTextDiv = document.getElementById("reasonText");

      // 初始化页面
      totalCountSpan.textContent = `总题数 ${questions.length}`;
      initSidebar();
      renderQuestion();
      updateStatus();

      function initSidebar() {
        // Group questions by type
        const types = {
          single: "单选题",
          multiple: "多选题",
        };

        navSections.innerHTML = "";

        Object.keys(types).forEach((type) => {
          const typeQuestions = questions.filter((q) => q.type === type);
          if (typeQuestions.length === 0) return;

          const section = document.createElement("div");
          section.className = "nav-section-wrapper";

          const title = document.createElement("div");
          title.className = "section-title";
          title.innerHTML = `<span>${types[type]}</span> <span>︾</span>`;
          section.appendChild(title);

          const grid = document.createElement("div");
          grid.className = "nav-grid";

          typeQuestions.forEach((q) => {
            const item = document.createElement("div");
            item.className = "nav-item";
            item.id = `nav-item-${q.id}`;
            item.textContent = q.id;
            item.onclick = () => {
              currentIdx = questions.findIndex((item) => item.id === q.id);
              renderQuestion();
            };
            grid.appendChild(item);
          });

          section.appendChild(grid);
          navSections.appendChild(section);
        });
      }

      function renderQuestion() {
        const q = questions[currentIdx];
        questionNum.textContent = `第${q.id}题`;

        let sharedGroupBadge = "";
        if (q.sharedGroup) {
          sharedGroupBadge = `<span style="background-color: #ff8c42; color: white; padding: 2px 8px; border-radius: 4px; font-size: 0.8rem; margin-left: 8px;">${q.sharedGroup.replace(/-/g, "~")}题组</span>`;
        }
        questionNum.innerHTML = `第${q.id}题 ${sharedGroupBadge}`;

        questionText.textContent = q.text;
        optionsList.innerHTML = "";

        q.options.forEach((opt) => {
          const key = opt.substring(0, 1);
          const li = document.createElement("li");
          li.className = "option-item";

          const input = document.createElement("input");
          input.type = q.type === "multiple" ? "checkbox" : "radio";
          input.name = "option";
          input.className = "option-input";
          input.value = key;

          // Check if already answered
          if (q.type === "multiple") {
            if (userAnswers[q.id] && userAnswers[q.id].includes(key)) {
              input.checked = true;
              li.classList.add("selected");
            }
          } else {
            if (userAnswers[q.id] === key) {
              input.checked = true;
              li.classList.add("selected");
            }
          }

          if (isSubmitted) input.disabled = true;

          input.onchange = () => {
            handleAnswer(q.id, key, q.type);
            updateStatus();
            renderSidebarStatus();
          };

          li.onclick = (e) => {
            if (isSubmitted) return;
            if (e.target !== input) {
              input.checked = q.type === "multiple" ? !input.checked : true;
              handleAnswer(q.id, key, q.type);
              updateStatus();
              renderSidebarStatus();
            }
          };

          const label = document.createElement("span");
          label.className = "option-label";
          label.textContent = opt;

          li.appendChild(input);
          li.appendChild(label);
          optionsList.appendChild(li);
        });

        renderSidebarStatus();
        showResultIfSubmitted();
      }

      function handleAnswer(qId, val, type) {
        if (type === "multiple") {
          if (!userAnswers[qId]) userAnswers[qId] = [];
          const idx = userAnswers[qId].indexOf(val);
          if (idx > -1) {
            userAnswers[qId].splice(idx, 1);
          } else {
            userAnswers[qId].push(val);
          }
          if (userAnswers[qId].length === 0) delete userAnswers[qId];
          else userAnswers[qId].sort();
        } else {
          userAnswers[qId] = val;
        }

        // Update selected class in UI
        const items = optionsList.querySelectorAll(".option-item");
        items.forEach((item) => {
          const input = item.querySelector("input");
          if (input.checked) item.classList.add("selected");
          else item.classList.remove("selected");
        });
      }

      function renderSidebarStatus() {
        const navItems = document.querySelectorAll(".nav-item");
        navItems.forEach((item) => {
          const id = parseInt(item.textContent);
          item.classList.remove("current", "answered", "wrong");

          if (id === questions[currentIdx].id) {
            item.classList.add("current");
          } else if (userAnswers[id]) {
            item.classList.add("answered");
          }

          if (isSubmitted) {
            const q = questions.find((q) => q.id === id);
            const userAns = userAnswers[id];
            const correctAns = q.answer;

            let isCorrect = false;
            if (q.type === "multiple") {
              isCorrect =
                Array.isArray(userAns) &&
                userAns.length === correctAns.length &&
                userAns.every((v, i) => v === correctAns[i]);
            } else {
              isCorrect = userAns === correctAns;
            }

            if (!isCorrect) {
              item.classList.add("wrong");
            }
          }
        });
      }

      function updateStatus() {
        const answeredCount = Object.keys(userAnswers).length;
        answeredCountSpan.textContent = `已答 ${answeredCount} 题`;
        const progress = Math.round((answeredCount / questions.length) * 100);
        progressBar.style.width = `${progress}%`;
        progressText.textContent = `${progress}%`;
      }

      function showResultIfSubmitted() {
        if (!isSubmitted) {
          resultBox.classList.remove("show");
          return;
        }

        const q = questions[currentIdx];
        const userAns = userAnswers[q.id];
        const correctAns = q.answer;

        let isCorrect = false;
        if (q.type === "multiple") {
          isCorrect =
            Array.isArray(userAns) &&
            userAns.length === correctAns.length &&
            userAns.every((v, i) => v === correctAns[i]);
        } else {
          isCorrect = userAns === correctAns;
        }

        resultBox.className = `result-box show ${isCorrect ? "correct" : "wrong"}`;
        correctAnswerDiv.innerHTML = `<strong>正确答案：</strong> ${Array.isArray(correctAns) ? correctAns.join("") : correctAns}`;
        reasonTextDiv.textContent = q.reason;
      }

      document.getElementById("prevBtn").onclick = () => {
        if (currentIdx > 0) {
          currentIdx--;
          renderQuestion();
        }
      };

      document.getElementById("nextBtn").onclick = () => {
        if (currentIdx < questions.length - 1) {
          currentIdx++;
          renderQuestion();
        }
      };

      document.getElementById("submitBtn").onclick = () => {
        if (isSubmitted) return;
        if (!confirm("确定要交卷吗？交卷后不可更改答案。")) return;

        isSubmitted = true;
        let score = 0;
        questions.forEach((q) => {
          const userAns = userAnswers[q.id];
          const correctAns = q.answer;
          let isCorrect = false;
          if (q.type === "multiple") {
            isCorrect =
              Array.isArray(userAns) &&
              userAns.length === correctAns.length &&
              userAns.every((v, i) => v === correctAns[i]);
          } else {
            isCorrect = userAns === correctAns;
          }
          if (isCorrect) score++;
        });

        document.getElementById("finalScore").textContent = score;
        document.getElementById("scoreModal").style.display = "flex";
        document.getElementById("submitBtn").disabled = true;
        renderQuestion(); // To update disabled inputs and results
      };

      function closeModal() {
        document.getElementById("scoreModal").style.display = "none";
      }

      // Timer logic
      let secondsLeft = 90 * 60;
      const timeLeftSpan = document.getElementById("timeLeft");
      const timer = setInterval(() => {
        if (isSubmitted) {
          clearInterval(timer);
          return;
        }
        secondsLeft--;
        const mins = Math.floor(secondsLeft / 60);
        const secs = secondsLeft % 60;
        timeLeftSpan.textContent = `剩余时间：${mins} 分钟 ${secs} 秒`;
        if (secondsLeft <= 0) {
          clearInterval(timer);
          alert("时间到，系统已自动交卷。");
          document.getElementById("submitBtn").click();
        }
      }, 1000);

      // Keyboard navigation
      window.onkeydown = (e) => {
        if (e.key === "ArrowLeft") document.getElementById("prevBtn").click();
        if (e.key === "ArrowRight") document.getElementById("nextBtn").click();
      };

      // Calculator logic
      let calcExpr = "";
      const calcDisplay = document.getElementById("calcDisplay");

      function toggleCalc() {
        const modal = document.getElementById("calcModal");
        modal.style.display = modal.style.display === "flex" ? "none" : "flex";
        if (modal.style.display === "none") calcClear();
      }

      function calcInput(val) {
        if (calcExpr === "0" && val !== ".") calcExpr = "";
        calcExpr += val;
        calcDisplay.textContent = calcExpr || "0";
      }

      function calcClear() {
        calcExpr = "";
        calcDisplay.textContent = "0";
      }

      function calcEqual() {
        try {
          // 使用 Function 构造函数安全地计算表达式结果
          const result = new Function(`return ${calcExpr}`)();
          calcExpr = String(result);
          calcDisplay.textContent = calcExpr;
        } catch (e) {
          calcDisplay.textContent = "Error";
          calcExpr = "";
        }
      }
    </script>
  </body>
</html>
